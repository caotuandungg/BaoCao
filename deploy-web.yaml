apiVersion: apps/v1
kind: Deployment
metadata:
  name: dung-web-log-generator
  namespace: dung-lab
  labels:
    owner: dung
    project: dung-lab
    purpose: log-testing
    component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dung-web-log-generator
  template:
    metadata:
      labels:
        app: dung-web-log-generator
        owner: dung
        project: dung-lab
        purpose: log-testing
        component: web
    spec:
      containers:
      - name: web
        image: python:3.11-alpine
        command: ["python", "/scripts/web.py"]
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
        volumeMounts:
        - name: scripts
          mountPath: /scripts
      volumes:
      - name: scripts
        configMap:
          name: dung-log-generator-scripts

# Elasticsearch values (minimal) for personal logging stack on wk03

replicas: 1

# Single-node ES cannot become green while indices have replicas.
# Mark the pod ready once primary shards are active so services/ingress work.
clusterHealthCheckParams: "wait_for_status=yellow&timeout=1s"

# The node currently holds many shards and Kibana queries can trigger async search
# responses large enough to exhaust a 1 GiB JVM heap. Give ES a bit more heap
# headroom while keeping the stack small enough for this worker node.
esJavaOpts: "-Xms1536m -Xmx1536m"

nodeSelector:
  kubernetes.io/hostname: wk03

resources:
  requests:
    cpu: "500m"
    memory: "2Gi"
  limits:
    cpu: "1000m"
    memory: "3Gi"

volumeClaimTemplate:
  accessModes: ["ReadWriteOnce"]
  storageClassName: "csi-cinder-sc-delete"
  resources:
    requests:
      storage: 10Gi

esConfig:
  elasticsearch.yml: |
    xpack.security.enabled: true
    xpack.security.http.ssl.enabled: true
    xpack.ml.enabled: false
    ingest.geoip.downloader.enabled: false


# Cấu hình Kibana Logging - High Availability (HA)
# File này dùng để chạy lệnh: helm upgrade kibana-dung elastic/kibana -f kibana-logging-values.yaml --namespace elk

elasticsearchHosts: "https://elasticsearch-master.elk-dung.svc:9200"

kibanaConfig:
  kibana.yml: |
    elasticsearch.ssl.verificationMode: none

service:
  port: 5601

# Thiết lập HA: 3 bản sao rải đều trên 3 Node
replicas: 1
antiAffinity: "hard" 
nodeSelector:
  kubernetes.io/hostname: wk03

resources:
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    cpu: "500m"
    memory: "1Gi"


# Github config file:  https://github.com/fluent/helm-charts/blob/main/charts/fluent-bit/values.yaml
kind: DaemonSet
hostNetwork: true
dnsPolicy: ClusterFirstWithHostNet
nodeSelector:
  kubernetes.io/hostname: wk03

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi


config:
  service: |
    [SERVICE]
        Flush                  5
        Grace                  30
        Log_Level              info
        Daemon                 off
        Parsers_File           parsers.conf
        Parsers_File           custom_parsers.conf
        HTTP_Server            On
        HTTP_Listen            0.0.0.0
        HTTP_Port              2020
        storage.path           /var/fluent-bit/state
        storage.sync           normal
        storage.checksum       off
        storage.max_chunks_up  128

  inputs: |
    [INPUT]
        Name              tail
        # Input all: read all container logs except 3 special groups below.
        Path              /var/log/containers/*.log
        Exclude_Path      /var/log/containers/cilium-envoy-*_kube-system_cilium-envoy-*.log,/var/log/containers/cilium-*_kube-system_cilium-agent-*.log,/var/log/containers/openstack-cinder-csi-nodeplugin-*_kube-system_*.log
        Read_from_Head    On
        Parser            cri
        Tag               kube.all.*
        Refresh_Interval  5
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        DB                /var/fluent-bit/state/tail-db-all
        DB.locking        true
        storage.type      filesystem

    [INPUT]
        Name              tail
        # Input special: read only selected kube-system pod groups.
        Path              /var/log/containers/cilium-envoy-*_kube-system_cilium-envoy-*.log,/var/log/containers/cilium-*_kube-system_cilium-agent-*.log,/var/log/containers/openstack-cinder-csi-nodeplugin-*_kube-system_*.log
        Read_from_Head    On
        Parser            cri
        Tag               kube.special.*
        Refresh_Interval  5
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        DB                /var/fluent-bit/state/tail-db-special-v2
        DB.locking        true
        storage.type      filesystem

    [INPUT]
        Name              kubernetes_events
        Tag               kube.events
        Kube_URL          https://kubernetes.default.svc:443
        Kube_CA_File      /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File   /var/run/secrets/kubernetes.io/serviceaccount/token

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.all.*
        Kube_Tag_Prefix     kube.all.var.log.containers.
        Buffer_Size         256k
        Merge_Log           Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off

    [FILTER]
        Name                kubernetes
        Match               kube.special.*
        Kube_Tag_Prefix     kube.special.var.log.containers.
        Buffer_Size         256k
        Merge_Log           Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off

    [FILTER]
        Name         parser
        Match        kube.all.*
        Key_Name     log 
        Parser       json_log
        Reserve_Data On
        Preserve_Key Off

    [FILTER]
        Name         parser
        Match        kube.special.*
        Key_Name     log 
        Parser       json_log
        Reserve_Data On
        Preserve_Key Off

  outputs: |
    [OUTPUT]
        Name           kafka
        Match          kube.*
        Brokers        my-cluster-kafka-bootstrap.kafka-dung.svc:9092
        Topics         dung-logs-topic
        Format         json
        Timestamp_Key  @timestamp
        Timestamp_Format iso8601
        storage.total_limit_size 50MB

  customParsers: |
    [PARSER]
        Name        json_log
        Format      json
        Time_Key    @timestamp
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
        Time_Keep   On

rbac:
  create: true
  nodeAccess: true
  eventsAccess: true

daemonSetVolumes:
  - name: varlog
    hostPath:
      path: /var/log
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers
  - name: etcmachineid
    hostPath:
      path: /etc/machine-id
      type: File
  - name: fluent-bit-state
    hostPath:
      path: /var/fluent-bit/state
      type: DirectoryOrCreate

daemonSetVolumeMounts:
  - name: varlog
    mountPath: /var/log
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readOnly: true
  - name: etcmachineid
    mountPath: /etc/machine-id
    readOnly: true
  - name: fluent-bit-state
    mountPath: /var/fluent-bit/state


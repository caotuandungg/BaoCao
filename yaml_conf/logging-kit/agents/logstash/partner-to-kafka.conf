input {
  file {
    path => "${LOG_PATH:/var/log/app/*.log}"
    start_position => "beginning"
    sincedb_path => "/var/lib/logstash/sincedb-external-app"
    codec => json {
      ecs_compatibility => disabled
    }
  }
}

filter {
  mutate {
    add_field => {
      "service" => "${SERVICE_NAME:payment-api}"
      "environment" => "${ENVIRONMENT:prod}"
      "tenant" => "${TENANT:partner-a}"
      "log_scope" => "${LOG_SCOPE:external}"
      "log_source" => "${LOG_SOURCE:external-app}"
      "[log_schema][name]" => "${LOG_SCHEMA_NAME:dung-standard-log}"
      "[log_schema][version]" => "${LOG_SCHEMA_VERSION:1.0}"
      "[pipeline][stage]" => "normalized"
      "[pipeline][producer]" => "partner-logstash"
    }
  }

  ruby {
    code => '
      event.set("[pipeline][normalized]", true)
      processed_by = event.get("[pipeline][processed_by]")
      processed_by = [] unless processed_by.is_a?(Array)
      processed_by << "partner-logstash" unless processed_by.include?("partner-logstash")
      event.set("[pipeline][processed_by]", processed_by)
    '
  }
}

output {
  kafka {
    bootstrap_servers => "${KAFKA_BROKERS:my-cluster-kafka-bootstrap.kafka-dung.svc:9092}"
    topic_id => "${KAFKA_TOPIC:vm-logs-topic}"
    codec => json
  }
}


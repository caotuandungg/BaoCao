[SERVICE]
    Flush        2
    Grace        30
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf
    storage.path /var/lib/fluent-bit/state

[INPUT]
    Name              tail
    Tag               external.app
    Path              ${LOG_PATH}
    Parser            app_json
    Read_from_Head    On
    Refresh_Interval  5
    Rotate_Wait       30
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On
    DB                /var/lib/fluent-bit/state/external-app.db
    DB.locking        true
    storage.type      filesystem

[FILTER]
    Name              lua
    Match             external.app
    script            enrich.lua
    call              enrich_standard_log

[OUTPUT]
    Name              kafka
    Match             external.app
    Brokers           ${KAFKA_BROKERS}
    Topics            ${KAFKA_TOPIC}
    Format            json
    Timestamp_Key     @timestamp
    Timestamp_Format  iso8601
    Retry_Limit       False
    rdkafka.client.id fluent-bit-${SERVICE_NAME}
    rdkafka.request.required.acks 1

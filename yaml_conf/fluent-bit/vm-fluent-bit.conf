# https://docs.fluentbit.io/manual/administration/configuring-fluent-bit/yaml

[SERVICE]
    Flush                  2
    Grace                  30
    Daemon                 Off
    Log_Level              info
    Parsers_File           /etc/fluent-bit/parsers.conf
    Parsers_File           /etc/fluent-bit/vm-parsers.conf
    storage.path           /var/lib/fluent-bit/state
    storage.sync           normal
    storage.checksum       off
    storage.max_chunks_up  64
    HTTP_Server            On
    HTTP_Listen            0.0.0.0
    HTTP_Port              2020

#   4 fake apps :
#   /var/log/dung-lab/fe.log
#   /var/log/dung-lab/be.log
#   /var/log/dung-lab/db.log
#   /var/log/dung-lab/web.log
#   /var/log/dung-lab/nestjs.log
#   /var/log/dung-lab/nestjs.err.log
#
# Python generator logs are JSON. NestJS logs are raw text and are parsed later by Logstash.
[INPUT]
    Name              tail                # Plugin đọc file từ cuối
    Tag               vm.dunglab.fe       # Gắn nhãn nhận diện cho log
    Path              /var/log/dung-lab/fe.log # Đường dẫn file log fe
    Parser            app_json            # Bộ lọc log định dạng JSON
    Read_from_Head    On                  # Đọc từ đầu nếu file mới
    Refresh_Interval  5                   # Kiểm tra log mới mỗi 5 giây
    Rotate_Wait       30                  # Đợi 30s sau khi xoay file log
    Mem_Buf_Limit     5MB                 # Giới hạn bộ nhớ đệm 5MB
    Skip_Long_Lines   On                  # Bỏ qua các dòng log quá dài
    DB                /var/lib/fluent-bit/state/fe.db # Ghi nhớ vị trí đã đọc
    DB.locking        true                # Khóa file DB tránh xung đột
    storage.type      filesystem          # Lưu đệm tạm thời xuống ổ cứng


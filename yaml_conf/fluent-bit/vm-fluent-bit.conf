[FILTER]
    Name              modify              # Plugin sửa đổi bản ghi log
    Match             vm.dunglab.*        # Áp dụng cho log có tag tương ứng
    Add               log_source vm-dung-lab # Thêm nguồn log
    Add               log_scope external  # Đánh dấu phạm vi bên ngoài
    Add               vm_name simple-vm   # Tên của VM phát sinh log
    Add               environment lab     # Đánh dấu môi trường lab

[OUTPUT]
    Name              kafka               # Gửi dữ liệu về Kafka
    Match             vm.dunglab.*        # Chỉ gửi log có tag tương ứng
    Brokers           dung-my-cluster-b0.kafka.vnpost.cloud:443 # Địa chỉ Kafka
    Topics            vm-logs-topic       # Tên topic nhận log
    Format            json                # Gửi theo định dạng JSON
    Timestamp_Key     @timestamp          # Khai báo trường thời gian
    Timestamp_Format  iso8601             # Định dạng ISO8601 cho thời gian
    Retry_Limit       False               # Thử lại vô hạn nếu lỗi
    rdkafka.client.id fluent-bit-simple-vm # ID máy khách gửi log
    rdkafka.security.protocol ssl         # Dùng bảo mật SSL
    rdkafka.ssl.ca.location /etc/fluent-bit/kafka-ca.crt # Đường dẫn chứng chỉ CA
    rdkafka.request.required.acks 1       # Yêu cầu Kafka xác nhận nhận tin
    storage.total_limit_size 50MB         # Giới hạn đệm ổ cứng 50MB

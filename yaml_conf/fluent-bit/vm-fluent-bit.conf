[SERVICE]
    Flush                  2
    Grace                  30
    Daemon                 Off
    Log_Level              info
    Parsers_File           /etc/fluent-bit/parsers.conf
    Parsers_File           /etc/fluent-bit/vm-parsers.conf
    storage.path           /var/lib/fluent-bit/state
    storage.sync           normal
    storage.checksum       off
    storage.max_chunks_up  64
    HTTP_Server            On
    HTTP_Listen            0.0.0.0
    HTTP_Port              2020

# Preferred VM layout: write the 4 fake apps to these files:
#   /var/log/dung-lab/fe.log
#   /var/log/dung-lab/be.log
#   /var/log/dung-lab/db.log
#   /var/log/dung-lab/web.log
#
# Each line is already JSON from the Python scripts in yaml_conf/log-generators.
[INPUT]
    Name              tail
    Tag               vm.dunglab.fe
    Path              /var/log/dung-lab/fe.log
    Parser            app_json
    Read_from_Head    On
    Refresh_Interval  5
    Rotate_Wait       30
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On
    DB                /var/lib/fluent-bit/state/fe.db
    DB.locking        true
    storage.type      filesystem

[INPUT]
    Name              tail
    Tag               vm.dunglab.be
    Path              /var/log/dung-lab/be.log
    Parser            app_json
    Read_from_Head    On
    Refresh_Interval  5
    Rotate_Wait       30
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On
    DB                /var/lib/fluent-bit/state/be.db
    DB.locking        true
    storage.type      filesystem

[INPUT]
    Name              tail
    Tag               vm.dunglab.db
    Path              /var/log/dung-lab/db.log
    Parser            app_json
    Read_from_Head    On
    Refresh_Interval  5
    Rotate_Wait       30
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On
    DB                /var/lib/fluent-bit/state/db.db
    DB.locking        true
    storage.type      filesystem

[INPUT]
    Name              tail
    Tag               vm.dunglab.web
    Path              /var/log/dung-lab/web.log
    Parser            app_json
    Read_from_Head    On
    Refresh_Interval  5
    Rotate_Wait       30
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On
    DB                /var/lib/fluent-bit/state/web.db
    DB.locking        true
    storage.type      filesystem

[FILTER]
    Name              modify
    Match             vm.dunglab.*
    Add               log_source vm-dung-lab
    Add               log_scope external
    Add               vm_name simple-vm
    Add               environment lab

[OUTPUT]
    Name              kafka
    Match             vm.dunglab.*
    Brokers           dung-my-cluster-b0.kafka.vnpost.cloud:443
    Topics            vm-logs-topic
    Format            json
    Timestamp_Key     @timestamp
    Timestamp_Format  iso8601
    Retry_Limit       False
    rdkafka.client.id fluent-bit-simple-vm
    rdkafka.security.protocol ssl
    rdkafka.ssl.ca.location /etc/fluent-bit/kafka-ca.crt
    rdkafka.request.required.acks 1
    storage.total_limit_size 50MB

# Values for fluent/fluent-bit inside Kubernetes.
# Do not use this file for the external VM Fluent Bit agent.
# For the VM agent, use vm-fluent-bit-to-kafka.conf and vm-parsers.conf.
kind: DaemonSet

hostNetwork: true
dnsPolicy: ClusterFirstWithHostNet

nodeSelector:
  kubernetes.io/hostname: wk03

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

config:
  service: |
    [SERVICE]
        Flush                  2
        Grace                  30
        Log_Level              info
        Daemon                 off
        Parsers_File           parsers.conf
        Parsers_File           custom_parsers.conf
        HTTP_Server            On
        HTTP_Listen            0.0.0.0
        HTTP_Port              2020
        storage.path           /var/fluent-bit/state
        storage.sync           normal
        storage.checksum       off
        storage.max_chunks_up  64

  inputs: |
    [INPUT]
        Name              tail
        Tag               kube.dunglab.*
        Path              /var/log/containers/dung-fe-log-generator-*_dung-lab_fe-*.log,/var/log/containers/dung-be-log-generator-*_dung-lab_be-*.log,/var/log/containers/dung-db-log-generator-*_dung-lab_db-*.log,/var/log/containers/dung-web-log-generator-*_dung-lab_web-*.log
        Parser            cri
        Read_from_Head    On
        Refresh_Interval  5
        Rotate_Wait       30
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        DB                /var/fluent-bit/state/tail-dung-lab.db
        DB.locking        true
        storage.type      filesystem

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.dunglab.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.dunglab.var.log.containers.
        Buffer_Size         256k
        Merge_Log           On
        Merge_Parser        app_json
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off
        Labels              On
        Annotations         Off

    [FILTER]
        Name                modify
        Match               kube.dunglab.*
        Add                 log_source dung-lab-generators
        Add                 kafka_topic dung-logs-topic
        Add                 cluster my-cluster

  outputs: |
    [OUTPUT]
        Name                      kafka
        Match                     kube.dunglab.*
        Brokers                   my-cluster-kafka-bootstrap.kafka-dung.svc:9092
        Topics                    dung-logs-topic
        Format                    json
        Timestamp_Key             fluentbit_timestamp
        Timestamp_Format          iso8601
        Retry_Limit               False
        rdkafka.client.id         fluent-bit-dung-lab
        rdkafka.request.required.acks 1
        storage.total_limit_size  50MB

  customParsers: |
    [PARSER]
        Name        app_json
        Format      json
        Time_Key    @timestamp
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
        Time_Keep   On

rbac:
  create: true
  nodeAccess: true
  eventsAccess: false

daemonSetVolumes:
  - name: varlog
    hostPath:
      path: /var/log
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers
  - name: etcmachineid
    hostPath:
      path: /etc/machine-id
      type: File
  - name: fluent-bit-state
    hostPath:
      path: /var/fluent-bit/state
      type: DirectoryOrCreate

daemonSetVolumeMounts:
  - name: varlog
    mountPath: /var/log
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readOnly: true
  - name: etcmachineid
    mountPath: /etc/machine-id
    readOnly: true
  - name: fluent-bit-state
    mountPath: /var/fluent-bit/state

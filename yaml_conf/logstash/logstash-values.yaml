# https://github.com/elastic/helm-charts/blob/main/logstash/values.yaml (ctrl f search)
# helm upgrade --install logstash-dung elastic/logstash -n elk-dung -f yaml_conf/logstash/logstash-values.yaml
# kubectl rollout status statefulset/logstash-dung-logstash -n elk-dung --timeout=180s


replicas: 1                          # Chỉ chạy 1 instance (đọc file log local trên Node)
nodeSelector:                        # Pin lên Node wk03 (nơi chứa container logs)
  kubernetes.io/hostname: wk03

podSecurityContext:
  fsGroup: 0

securityContext:
  runAsUser: 0
  runAsNonRoot: false

resources:                           
  requests:                          # Mức tài nguyên tối thiểu cần để khởi chạy
    cpu: "500m"                      # 0.5 CPU
    memory: "1536Mi"                 # 1.5 GB RAM
  limits:                            # Mức tài nguyên tối đa Pod được phép sử dụng
    cpu: "1000m"                     # 1 CPU
    memory: "2500Mi"                 # 2.5 GB RAM

logstashJavaOpts: "-Xms1536m -Xmx1536m" # Giảm heap để bớt chiếm RAM node nhưng vẫn đủ cho pipeline hiện tại

readinessProbe:                      # Kiểm tra xem Pod đã sẵn sàng nhận log chưa (readiness)
  httpGet:
    path: /
    port: 9600                       # Cổng API của Logstash
  initialDelaySeconds: 120           # Đợi 120 giây sau khi start mới bắt đầu check
  periodSeconds: 10                  # Tần suất kiểm tra: mỗi 10 giây
  timeoutSeconds: 10                 # Thời gian chờ phản hồi tối đa 10 giây
  failureThreshold: 12               # Thử lại tối đa 12 lần trước khi coi là không sẵn sàng

livenessProbe:                       # Kiểm tra xem Pod còn sống không (nếu chết sẽ tự restart)
  httpGet:
    path: /
    port: 9600
  initialDelaySeconds: 180           # Đợi 180 giây trước khi bắt đầu check
  periodSeconds: 20
  timeoutSeconds: 10
  failureThreshold: 6                # Thử lại 6 lần trước khi restart Pod

persistence:                         # Cấu hình lưu trữ dữ liệu bền vững
  enabled: true                      # Kích hoạt sử dụng ổ cứng (PVC)

volumeClaimTemplate:                 # Khuôn mẫu yêu cầu cấp phát ổ cứng
  accessModes: ["ReadWriteOnce"]     # Quyền truy cập: một Node có thể đọc/ghi
  storageClassName: "csi-cinder-sc-delete" # Tên Storage Class của hệ thống (OpenStack Cinder)
  resources:
    requests:
      storage: 5Gi                   # Dung lượng ổ cứng yêu cầu: 5 GB

logstashConfig:                      # Cấu hình file logstash.yml bên trong Pod
  logstash.yml: |
    http.host: "0.0.0.0"             # Cho phép kết nối API từ bên ngoài
    xpack.monitoring.enabled: false  # Tắt tính năng monitoring tự động của X-Pack
    pipeline.workers: 1              # Số lượng luồng xử lý (worker threads) cho pipeline
    pipeline.batch.size: 50          # Giảm batch để hạ memory spike khi filter/split
    pipeline.batch.delay: 50         # Thời gian chờ tối đa (ms) trước khi xử lý một batch
    queue.type: persisted           # Sử dụng hàng đợi trên ổ cứng để tránh mất log khi crash
    queue.max_bytes: 256mb           # Giảm queue vì queue lớn đang chiếm thêm RAM/disk cache
    dead_letter_queue.enable: false  # Tắt DLQ để giảm footprint, ưu tiên chạy gọn trên wk03

logstashPipeline:
  logstash.conf: ""
  01-input.conf: |
    input {
      file {
        path => "/var/log/containers/*.log"
        exclude => ["*logstash-dung-logstash*"]
        start_position => "beginning"
        sincedb_path => "/usr/share/logstash/data/sincedb"
        codec => plain
        type => "container"
      }
    }

  10-filter-cri-k8s.conf: |
    filter {
      ruby {
        code => '
          source_path = event.get("path") ||
                        event.get("[log][file][path]") ||
                        event.get("[file][path]")

          if source_path.is_a?(String) && !source_path.empty?
            event.set("[@metadata][source_path]", source_path)
            basename = source_path.split("/").last
            match = basename.match(/\A(?<pod>.+)_(?<namespace>[^_]+)_(?<container_full>.+)\.log\z/)

            if match
              event.set("[kubernetes][pod_name]", match[:pod])
              event.set("[kubernetes][namespace_name]", match[:namespace])

              container_full = match[:container_full]
              container_name = container_full.sub(/-[0-9a-f]{64}\z/, "")
              event.set("[kubernetes][container_name]", container_name)
            else
              event.tag("_filename_parse_failure")
            end
          else
            event.tag("_filename_path_missing")
          end
        '
      }

      grok {
        match => {
          "message" => "^%{TIMESTAMP_ISO8601:cri_timestamp} %{WORD:stream} %{WORD:cri_flags} %{GREEDYDATA:log}"
        }
        tag_on_failure => ["_cri_parse_failure"]
      }

      if !("_cri_parse_failure" in [tags]) {
        date {
          match => ["cri_timestamp", "ISO8601"]
          target => "@timestamp"
        }
        mutate {
          replace => { "message" => "%{log}" }
          remove_field => ["cri_timestamp", "cri_flags"]
        }
      }

      ruby {
        code => '
          raw_message = event.get("log") || event.get("message")
          event.set("[@metadata][raw_message]", raw_message) if raw_message.is_a?(String)
          event.remove("[@metadata][source_path]")
        '
      }

      if [kubernetes][container_name] in [
        "apply-sysctl-overwrites",
        "clean-cilium-state",
        "config",
        "install-cni-binaries",
        "mount-bpf-fs",
        "mount-cgroup",
        "liveness-probe",
        "node-driver-registrar",
        "export-stdout"
      ] {
        drop {}
      }

      if [message] =~ "^{.*}$" {
        json {
          source => "message"
          target => "parsed_message"
          skip_on_invalid_json => true
        }
      }

      if [kubernetes][pod_name] =~ /^logstash/ or [kubernetes][container_name] == "logstash" or [message] =~ /\\[logstash\\.outputs\\.elasticsearch\\]/ {
        drop {}
      }

      if "_filename_parse_failure" in [tags] or "_filename_path_missing" in [tags] {
        drop {}
      }

      if [kubernetes][namespace_name] != "kube-system" {
        drop {}
      }

      ruby {
        code => '
          raw_message = event.get("[@metadata][raw_message]")
          parsed_message = event.get("parsed_message")
          level = nil
          msg = nil

          if parsed_message.is_a?(Hash)
            level = parsed_message["level"] ||
                    parsed_message["severity"] ||
                    parsed_message["lvl"]

            msg = parsed_message["msg"] ||
                  parsed_message["message"] ||
                  parsed_message["log"]
          end

          if raw_message.is_a?(String)
            if level.nil?
              level_match = raw_message.match(/\blevel=(?<level>[A-Za-z0-9_-]+)/)
              level = level_match[:level] if level_match
            end

            if msg.nil?
              quoted_msg_match = raw_message.match(/\bmsg="(?<msg>[^"]+)"/)
              msg = quoted_msg_match[:msg] if quoted_msg_match
            end

            if msg.nil?
              plain_msg_match = raw_message.match(/\bmsg=(?<msg>\S+)/)
              msg = plain_msg_match[:msg] if plain_msg_match
            end

            msg = raw_message if msg.nil? || msg.empty?
          end

          if level.nil?
            level = event.get("stream") == "stderr" ? "error" : "info"
          end

          event.set("level", level.to_s.downcase)
          if msg
            event.set("msg", msg)
            event.set("message", msg)
          end
        '
      }

      mutate {
        add_field => {
          "timestamp" => "%{@timestamp}"
        }
        remove_field => [
          "parsed_message",
          "log",
          "cri_timestamp",
          "cri_flags",
          "[@metadata][raw_message]"
        ]
      }
    }

  30-filter-routing.conf: |
    filter {
      ruby {
        code => '
          pod_name = event.get("[kubernetes][pod_name]")
          container_name = event.get("[kubernetes][container_name]")
          service_name = nil

          if pod_name.is_a?(String) && !pod_name.empty?
            service_name = pod_name.sub(/-[a-f0-9]{8,10}-[a-z0-9]{5}$/, "")
            service_name = service_name.sub(/-[a-z0-9]{5}$/, "") if service_name == pod_name
          end

          service_name = container_name if (service_name.nil? || service_name.empty?) && container_name.is_a?(String) && !container_name.empty?
          event.set("service", service_name) if service_name && !service_name.empty?
        '
      }

      if [kubernetes][namespace_name] == "kube-system" {
        mutate {
          add_field => {
            "namespace" => "kube-system"
            "event_dataset" => "kubernetes.container_logs"
            "log_scope" => "core-system"
            "[@metadata][route_target]" => "wk03-kube-system"
          }
        }
      }

      mutate {
        remove_field => [
          "[kubernetes][labels]",
          "[process_exec][parent][pod][pod_labels]",
          "[process_exec][process][pod][pod_labels]",
          "[process_exit][process][pod][pod_labels]",
          "[process_exit][parent][pod][pod_labels]"
        ]
      }
    }

  90-output.conf: |
    output {
      if [@metadata][route_target] == "wk03-kube-system" {
        elasticsearch {
          hosts => ["https://elasticsearch-master.elk-dung.svc.cluster.local:9200"]
          user => "elastic"
          password => "1xNIfTEXaH0MsbQN"
          ssl_certificate_verification => false
          index => "wk03-kube-system-write"
        }
      }

    }
# Mount thư mục log của Node vào Logstash Pod để đọc trực tiếp container logs
extraVolumes:
  - name: varlog
    hostPath:
      path: /var/log

extraVolumeMounts:
  - name: varlog
    mountPath: /var/log
    readOnly: true

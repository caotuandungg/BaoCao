# https://github.com/elastic/helm-charts/blob/main/logstash/values.yaml (ctrl f search)
# https://www.elastic.co/docs/reference/logstash/event-api
# helm upgrade --install logstash-dung elastic/logstash -n elk-dung -f yaml_conf/logstash/logstash-values.yaml
# kubectl rollout status statefulset/logstash-dung-logstash -n elk-dung --timeout=180s


replicas: 1                          # Chỉ chạy 1 instance (đọc file log local trên Node)
nodeSelector:                        # Pin lên Node wk03 (nơi chứa container logs)
  kubernetes.io/hostname: wk03

podSecurityContext:
  fsGroup: 0

securityContext:
  runAsUser: 0
  runAsNonRoot: false

resources:                           
  requests:                          # Mức tài nguyên tối thiểu cần để khởi chạy
    cpu: "500m"                      # 0.5 CPU
    memory: "1536Mi"                 # 1.5 GB RAM
  limits:                            # Mức tài nguyên tối đa Pod được phép sử dụng
    cpu: "1000m"                     # 1 CPU
    memory: "2500Mi"                 # 2.5 GB RAM

logstashJavaOpts: "-Xms1536m -Xmx1536m" # Giảm heap để bớt chiếm RAM node nhưng vẫn đủ cho pipeline hiện tại

readinessProbe:                      # Kiểm tra xem Pod đã sẵn sàng nhận log chưa (readiness)
  httpGet:
    path: /
    port: 9600                       # Cổng API của Logstash
  initialDelaySeconds: 120           # Đợi 120 giây sau khi start mới bắt đầu check
  periodSeconds: 10                  # Tần suất kiểm tra: mỗi 10 giây
  timeoutSeconds: 10                 # Thời gian chờ phản hồi tối đa 10 giây
  failureThreshold: 12               # Thử lại tối đa 12 lần trước khi coi là không sẵn sàng

livenessProbe:                       # Kiểm tra xem Pod còn sống không (nếu chết sẽ tự restart)
  httpGet:
    path: /
    port: 9600
  initialDelaySeconds: 180           # Đợi 180 giây trước khi bắt đầu check
  periodSeconds: 20
  timeoutSeconds: 10
  failureThreshold: 6                # Thử lại 6 lần trước khi restart Pod

persistence:                         # Cấu hình lưu trữ dữ liệu bền vững
  enabled: true                      # Kích hoạt sử dụng ổ cứng (PVC)

volumeClaimTemplate:                 # Khuôn mẫu yêu cầu cấp phát ổ cứng
  accessModes: ["ReadWriteOnce"]     # Quyền truy cập: một Node có thể đọc/ghi
  storageClassName: "csi-cinder-sc-delete" # Tên Storage Class của hệ thống (OpenStack Cinder)
  resources:
    requests:
      storage: 5Gi                   # Dung lượng ổ cứng yêu cầu: 5 GB

logstashConfig:                      # Cấu hình file logstash.yml bên trong Pod
  logstash.yml: |
    http.host: "0.0.0.0"             # Cho phép kết nối API từ bên ngoài
    xpack.monitoring.enabled: false  # Tắt tính năng monitoring tự động của X-Pack
    pipeline.workers: 1              # Số lượng luồng xử lý (worker threads) cho pipeline
    pipeline.batch.size: 50          # Giảm batch để hạ memory spike khi filter/split
    pipeline.batch.delay: 50         # Thời gian chờ tối đa (ms) trước khi xử lý một batch
    queue.type: persisted           # Sử dụng hàng đợi trên ổ cứng để tránh mất log khi crash
    queue.max_bytes: 256mb           # Giảm queue vì queue lớn đang chiếm thêm RAM/disk cache
    dead_letter_queue.enable: false  # Tắt DLQ để giảm footprint, ưu tiên chạy gọn trên wk03

logstashPipeline:
  logstash.conf: ""
  01-input.conf: |
    input {
      file {
        path => "/var/log/containers/*.log"
        exclude => ["*logstash-dung-logstash*"]
        start_position => "beginning"
        sincedb_path => "/usr/share/logstash/data/sincedb"
        codec => plain
        type => "container"
      }
    }

  10-filter-cilium-agent.conf: |
    filter {
      if [type] == "container" {
        # Chuan hoa duong dan file log de dung chung o cac buoc sau
        ruby {
          code => '
            source_path = event.get("path") || event.get("[log][file][path]") || event.get("[file][path]")
            event.set("[@metadata][source_path]", source_path) if source_path
          '
        }

        # Chi xu ly log tu container cilium-agent trong namespace kube-system
        if [@metadata][source_path] =~ /_kube-system_cilium-agent-.*\.log$/ {
          # Lay raw log goc de parse on dinh hon
          ruby {
            code => '
              raw_message = event.get("[event][original]") || event.get("message")
              event.set("[@metadata][raw_message]", raw_message) if raw_message
            '
          }

          # Boc lop CRI va tach cac field key=value chinh cua cilium-agent bang Grok
          grok {
            match => {
              "[@metadata][raw_message]" => [
                "^%{TIMESTAMP_ISO8601:cri_timestamp} %{WORD:stream} %{WORD:cri_flags} time=%{TIMESTAMP_ISO8601:timestamp} level=%{WORD:level} msg=\"%{DATA:msg}\"(?: module=%{NOTSPACE:module})?(?: %{GREEDYDATA:extra_fields})?$",
                "^%{TIMESTAMP_ISO8601:cri_timestamp} %{WORD:stream} %{WORD:cri_flags} level=%{WORD:level} msg=\"%{DATA:msg}\"(?: module=%{NOTSPACE:module})?(?: %{GREEDYDATA:extra_fields})?$",
                "^%{TIMESTAMP_ISO8601:cri_timestamp} %{WORD:stream} %{WORD:cri_flags} time=%{TIMESTAMP_ISO8601:timestamp} level=%{WORD:level} module=%{NOTSPACE:module} msg=\"%{DATA:msg}\"(?: %{GREEDYDATA:extra_fields})?$",
                "^%{TIMESTAMP_ISO8601:cri_timestamp} %{WORD:stream} %{WORD:cri_flags} time=%{TIMESTAMP_ISO8601:timestamp} level=%{WORD:level} subsys=%{NOTSPACE:subsys} msg=\"%{DATA:msg}\"(?: %{GREEDYDATA:extra_fields})?$",
                "^%{TIMESTAMP_ISO8601:cri_timestamp} %{WORD:stream} %{WORD:cri_flags} %{GREEDYDATA:msg}$"
              ]
            }
          }

          # Gan ten service de Kibana nhin duoc theo nhom log
          mutate {
            add_field => {
              "service_name" => "cilium-agent"
              "[kubernetes][hostname]" => "wk03"
            }
          }

          # Don cac field phu sau khi parse xong
          mutate {
            remove_field => [
              "message",
              "cri_timestamp",
              "cri_flags",
              "time",
              "path",
              "host",
              "type",
              "event",
              "@version",
              "extra_fields",
              "[@metadata][raw_message]"
            ]
          }
        }
      }
    }

  11-filter-cilium-envoy.conf: |
    filter {
      if [type] == "container" {
        # Chi xu ly log tu container cilium-envoy trong namespace kube-system
        if [@metadata][source_path] =~ /_kube-system_cilium-envoy-.*\.log$/ {
          # Boc lop CRI va tach log Envoy bang Grok
          grok {
            match => {
              "message" => [
                "^%{TIMESTAMP_ISO8601:cri_timestamp} %{WORD:stream} %{WORD:cri_flags} \\[%{DATA:timestamp}\\]\\[%{NUMBER:envoy_thread}\\]\\[%{WORD:level}\\]\\[%{DATA:envoy_component}\\] \\[%{DATA:envoy_source}\\] %{GREEDYDATA:msg}$",
                "^%{TIMESTAMP_ISO8601:cri_timestamp} %{WORD:stream} %{WORD:cri_flags} \\[%{DATA:timestamp}\\]\\[%{NUMBER:envoy_thread}\\]\\[%{WORD:level}\\]\\[%{DATA:envoy_component}\\] %{GREEDYDATA:msg}$",
                "^%{TIMESTAMP_ISO8601:cri_timestamp} %{WORD:stream} %{WORD:cri_flags} \\[%{DATA:timestamp}\\] %{WORD:level} %{GREEDYDATA:msg}$",
                "^%{TIMESTAMP_ISO8601:cri_timestamp} %{WORD:stream} %{WORD:cri_flags} %{IPORHOST:client_ip}:%{NUMBER:client_port} - - \\[%{DATA:http_timestamp}\\] \"%{WORD:http_method} %{DATA:url_path} HTTP/%{NUMBER:http_version}\" %{NUMBER:status_code} %{NUMBER:bytes} %{GREEDYDATA:msg}$",
                "^%{TIMESTAMP_ISO8601:cri_timestamp} %{WORD:stream} %{WORD:cri_flags} %{GREEDYDATA:msg}$"
              ]
            }
          }

          mutate {
            add_field => {
              "service_name" => "cilium-envoy"
              "event_dataset" => "cilium.envoy"
              "[kubernetes][hostname]" => "wk03"
            }
          }

          mutate {
            remove_field => [
              "message",
              "cri_timestamp",
              "cri_flags",
              "path",
              "host",
              "type",
              "event",
              "@version"
            ]
          }
        }
      }
    }

  12-filter-keep-selected.conf: |
    filter {
      # Chi giu lai cac nguon log da chon cho pipeline nay
      if ![@metadata][source_path] or [@metadata][source_path] !~ /_kube-system_(cilium-agent|cilium-envoy|tetragon|export-stdout)-.*\.log$/ {
        drop { }
      }
    }

  13-filter-tetragon-2db7.conf: |
    filter {
      if [type] == "container" {
        # Chi xu ly file log tetragon-2db7dc9332b38115d77744ef8d74b04f683b3aac70834ad147f5ead3904fb4e5.log
        if [@metadata][source_path] =~ /tetragon-vbwmt_kube-system_tetragon-2db7dc9332b38115d77744ef8d74b04f683b3aac70834ad147f5ead3904fb4e5\.log$/ {
          grok {
            match => {
              "message" => [
                "^%{TIMESTAMP_ISO8601:cri_timestamp} %{WORD:stream} %{WORD:cri_flags} level=%{WORD:level} msg=\"%{DATA:msg}\" name=%{NOTSPACE:policy_name} info=\"%{DATA:policy_info}\"(?: %{GREEDYDATA:extra_fields})?$",
                "^%{TIMESTAMP_ISO8601:cri_timestamp} %{WORD:stream} %{WORD:cri_flags} level=%{WORD:level} msg=\"%{DATA:msg}\" policy=%{NOTSPACE:policy_name} sensor=%{NOTSPACE:sensor} error=\"%{DATA:error_message}\"(?: %{GREEDYDATA:extra_fields})?$",
                "^%{TIMESTAMP_ISO8601:cri_timestamp} %{WORD:stream} %{WORD:cri_flags} level=%{WORD:level} msg=\"%{DATA:msg}\" sensor=%{NOTSPACE:sensor}(?: %{GREEDYDATA:extra_fields})?$",
                "^%{TIMESTAMP_ISO8601:cri_timestamp} %{WORD:stream} %{WORD:cri_flags} level=%{WORD:level} msg=\"%{DATA:msg}\" name=%{NOTSPACE:policy_name}(?: %{GREEDYDATA:extra_fields})?$",
                "^%{TIMESTAMP_ISO8601:cri_timestamp} %{WORD:stream} %{WORD:cri_flags} level=%{WORD:level} msg=\"%{DATA:msg}\"(?: %{GREEDYDATA:extra_fields})?$",
                "^%{TIMESTAMP_ISO8601:cri_timestamp} %{WORD:stream} %{WORD:cri_flags} %{GREEDYDATA:msg}$"
              ]
            }
          }

          mutate {
            add_field => {
              "service_name" => "tetragon-2db7"
              "event_dataset" => "tetragon.runtime"
              "tetragon_log_file" => "tetragon-2db7dc9332b38115d77744ef8d74b04f683b3aac70834ad147f5ead3904fb4e5"
              "[kubernetes][hostname]" => "wk03"
            }
          }

          mutate {
            remove_field => [
              "message",
              "cri_timestamp",
              "cri_flags",
              "path",
              "host",
              "type",
              "event",
              "@version",
              "extra_fields"
            ]
          }
        }
      }
    }

  14-filter-tetragon-fafa.conf: |
    filter {
      if [type] == "container" {
        # Chi xu ly file log tetragon-fafa0bab4f228294ff592f9bbe524511cec0c76d73518a40e80317f461311f3a.log
        if [@metadata][source_path] =~ /tetragon-vbwmt_kube-system_tetragon-fafa0bab4f228294ff592f9bbe524511cec0c76d73518a40e80317f461311f3a\.log$/ {
          grok {
            match => {
              "message" => [
                "^%{TIMESTAMP_ISO8601:cri_timestamp} %{WORD:stream} %{WORD:cri_flags} level=%{WORD:level} msg=\"%{DATA:msg}\" name=%{NOTSPACE:policy_name} info=\"%{DATA:policy_info}\"(?: %{GREEDYDATA:extra_fields})?$",
                "^%{TIMESTAMP_ISO8601:cri_timestamp} %{WORD:stream} %{WORD:cri_flags} level=%{WORD:level} msg=\"%{DATA:msg}\" policy=%{NOTSPACE:policy_name} sensor=%{NOTSPACE:sensor} error=\"%{DATA:error_message}\"(?: %{GREEDYDATA:extra_fields})?$",
                "^%{TIMESTAMP_ISO8601:cri_timestamp} %{WORD:stream} %{WORD:cri_flags} level=%{WORD:level} msg=\"%{DATA:msg}\" sensor=%{NOTSPACE:sensor}(?: %{GREEDYDATA:extra_fields})?$",
                "^%{TIMESTAMP_ISO8601:cri_timestamp} %{WORD:stream} %{WORD:cri_flags} level=%{WORD:level} msg=\"%{DATA:msg}\" name=%{NOTSPACE:policy_name}(?: %{GREEDYDATA:extra_fields})?$",
                "^%{TIMESTAMP_ISO8601:cri_timestamp} %{WORD:stream} %{WORD:cri_flags} level=%{WORD:level} msg=\"%{DATA:msg}\"(?: %{GREEDYDATA:extra_fields})?$",
                "^%{TIMESTAMP_ISO8601:cri_timestamp} %{WORD:stream} %{WORD:cri_flags} %{GREEDYDATA:msg}$"
              ]
            }
          }

          mutate {
            add_field => {
              "service_name" => "tetragon-fafa"
              "event_dataset" => "tetragon.runtime"
              "tetragon_log_file" => "tetragon-fafa0bab4f228294ff592f9bbe524511cec0c76d73518a40e80317f461311f3a"
              "[kubernetes][hostname]" => "wk03"
            }
          }

          mutate {
            remove_field => [
              "message",
              "cri_timestamp",
              "cri_flags",
              "path",
              "host",
              "type",
              "event",
              "@version",
              "extra_fields"
            ]
          }
        }
      }
    }

  15-filter-tetragon-export.conf: |
    filter {
      if [type] == "container" {
        # Chi xu ly log export-stdout cua tetragon trong kube-system
        if [@metadata][source_path] =~ /_kube-system_export-stdout-.*\.log$/ {
          # Tetragon sinh log rat nhieu, drop 99% de demo
          drop {
            percentage => 99
          }

          # Boc lop CRI ben ngoai bang Grok, giu lai payload JSON/text ben trong
          grok {
            match => {
              "message" => "^%{TIMESTAMP_ISO8601:cri_timestamp} %{WORD:stream} %{WORD:cri_flags} %{GREEDYDATA:app_message}$"
            }
          }

          # Gan service va cac field chinh cho nhom log tetragon-export 
          mutate {
            add_field => {
              "service_name" => "tetragon-export"
              "timestamp" => "%{cri_timestamp}"
              "msg" => "%{app_message}"
              "[kubernetes][hostname]" => "wk03"
            }
          }

          if [stream] == "stderr" {
            mutate {
              add_field => {
                "level" => "error"
              }
            }
          } else {
            mutate {
              add_field => {
                "level" => "info"
              }
            }
          }

          # Don cac field phu sau khi parse xong
          mutate {
            remove_field => [
              "message",
              "app_message",
              "cri_timestamp",
              "cri_flags",
              "path",
              "host",
              "type",
              "event",
              "@version"
            ]
          }
        }
      }
    }

  90-output.conf: |
    output {
      # Day toan bo log da duoc giu lai vao index kube-system chung
      elasticsearch {
        hosts => ["https://elasticsearch-master.elk-dung.svc.cluster.local:9200"]
        user => "elastic"
        password => "1xNIfTEXaH0MsbQN"
        ssl_certificate_verification => false
        index => "wk03-kube-system-write"
      }
    }
# Mount thư mục log của Node vào Logstash Pod để đọc trực tiếp container logs
extraVolumes:
  - name: varlog
    hostPath:
      path: /var/log

extraVolumeMounts:
  - name: varlog
    mountPath: /var/log
    readOnly: true

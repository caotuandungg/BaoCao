apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-dung-config
  namespace: elk-dung
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100

    common:
      path_prefix: /var/loki
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: 2024-01-01
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: loki_index_
            period: 24h

    storage_config:
      boltdb_shipper:
        active_index_directory: /var/loki/index
        cache_location: /var/loki/cache
        shared_store: filesystem
      filesystem:
        directory: /var/loki/chunks

    compactor:
      working_directory: /var/loki/compactor
      shared_store: filesystem

    limits_config:
      ingestion_rate_mb: 8
      ingestion_burst_size_mb: 16
      max_streams_per_user: 10000

    chunk_store_config:
      max_look_back_period: 24h

    table_manager:
      retention_deletes_enabled: true
      retention_period: 72h
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki-dung-data
  namespace: elk-dung
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: csi-cinder-sc-delete
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki-dung
  namespace: elk-dung
  labels:
    app: loki-dung
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki-dung
  template:
    metadata:
      labels:
        app: loki-dung
    spec:
      nodeSelector:
        kubernetes.io/hostname: wk03
      containers:
        - name: loki
          image: grafana/loki:2.9.8
          args:
            - -config.file=/etc/loki/loki.yaml
          ports:
            - containerPort: 3100
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: data
              mountPath: /var/loki
          readinessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: loki-dung-config
        - name: data
          persistentVolumeClaim:
            claimName: loki-dung-data
---
apiVersion: v1
kind: Service
metadata:
  name: loki-dung
  namespace: elk-dung
spec:
  selector:
    app: loki-dung
  ports:
    - name: http
      port: 3100
      targetPort: 3100
  type: ClusterIP

input {
  file {
    path => "/var/log/dung-lab/*.log"
    start_position => "beginning"
    sincedb_path => "/var/lib/logstash/sincedb_dunglab"
    codec => plain
    type => "vm_app_log"
  }
}

filter {
  if [type] == "vm_app_log" {
    if [path] {
      grok {
        match => {
          "path" => "/var/log/dung-lab/%{DATA:service_name}(?:\.err)?\.log$"
        }
        tag_on_failure => ["_vm_path_parse_failure"]
      }
    }
    else if [log][file][path] {
      grok {
        match => {
          "[log][file][path]" => "/var/log/dung-lab/%{DATA:service_name}(?:\.err)?\.log$"
        }
        tag_on_failure => ["_vm_path_parse_failure"]
      }
    }

    if [service_name] == "be" {
      grok {
        match => {
          "message" => '^\{"@timestamp":"%{TIMESTAMP_ISO8601:log_timestamp}","service":"%{DATA:service}","level":"%{WORD:level}","event":"%{DATA:event}","environment":"%{DATA:environment}","endpoint":"%{DATA:endpoint}","request_id":"%{DATA:request_id}","status_code":%{INT:status_code:int},"error_code":"%{DATA:error_code}","message":"%{DATA:message}"\}$'
        }
        overwrite => ["message"]
        tag_on_failure => ["_vm_be_grok_failure"]
      }
    }
    else if [service_name] == "db" {
      grok {
        match => {
          "message" => '^\{"@timestamp":"%{TIMESTAMP_ISO8601:log_timestamp}","service":"%{DATA:service}","level":"%{WORD:level}","event":"%{DATA:event}","environment":"%{DATA:environment}","db_name":"%{DATA:db_name}","query_type":"%{DATA:query_type}","duration_ms":%{INT:duration_ms:int},"db_user":"%{DATA:db_user}","message":"%{DATA:message}"\}$'
        }
        overwrite => ["message"]
        tag_on_failure => ["_vm_db_grok_failure"]
      }
    }
    else if [service_name] == "fe" {
      grok {
        match => {
          "message" => '^\{"@timestamp":"%{TIMESTAMP_ISO8601:log_timestamp}","service":"%{DATA:service}","level":"%{WORD:level}","event":"%{DATA:event}","environment":"%{DATA:environment}","path":"%{DATA:url_path}","user_id":"%{DATA:user_id}","session_id":"%{DATA:session_id}","response_time_ms":%{INT:response_time_ms:int},"message":"%{DATA:message}"\}$'
        }
        overwrite => ["message"]
        tag_on_failure => ["_vm_fe_grok_failure"]
      }
    }
    else if [service_name] == "web" {
      grok {
        match => {
          "message" => '^\{"@timestamp":"%{TIMESTAMP_ISO8601:log_timestamp}","service":"%{DATA:service}","level":"%{WORD:level}","event":"%{DATA:event}","environment":"%{DATA:environment}","method":"%{WORD:method}","path":"%{DATA:url_path}","status_code":%{INT:status_code:int},"client_ip":"%{IP:client_ip}","message":"%{DATA:message}"\}$'
        }
        overwrite => ["message"]
        tag_on_failure => ["_vm_web_grok_failure"]
      }
    }
    else if [service_name] == "nestjs" {
      grok {
        match => {
          "message" => [
            '^\[Nest\]\s+%{INT:process_id:int}\s+-\s+%{DATA:nest_timestamp}\s+%{LOGLEVEL:level}\s+\[%{DATA:nest_context}\]\s+%{GREEDYDATA:message}$',
            '^\[Nest\]\s+%{INT:process_id:int}\s+-\s+%{DATA:nest_timestamp}\s+%{WORD:level}\s+\[%{DATA:nest_context}\]\s+%{GREEDYDATA:message}$',
            '^%{GREEDYDATA:message}$'
          ]
        }
        overwrite => ["message"]
        tag_on_failure => ["_vm_nestjs_grok_failure"]
      }
    }

    if [service_name] in ["fe", "frontend"] {
      mutate {
        remove_field => ["service"]
        add_field => {
          "service" => "frontend"
          "[@metadata][route_target]" => "frontend"
        }
      }
    }
    else if [service_name] in ["be", "backend"] {
      mutate {
        remove_field => ["service"]
        add_field => {
          "service" => "backend"
          "[@metadata][route_target]" => "backend"
        }
      }
    }
    else if [service_name] in ["db", "database"] {
      mutate {
        remove_field => ["service"]
        add_field => {
          "service" => "database"
          "[@metadata][route_target]" => "database"
        }
      }
    }
    else if [service_name] in ["web", "webserver"] {
      mutate {
        remove_field => ["service"]
        add_field => {
          "service" => "webserver"
          "[@metadata][route_target]" => "webserver"
        }
      }
    }
    else if [service_name] == "nestjs" {
      mutate {
        remove_field => ["service"]
        add_field => {
          "service" => "nestjs"
          "[@metadata][route_target]" => "nestjs"
        }
      }
    }
    else {
      mutate {
        add_field => {
          "[@metadata][route_target]" => "wk03-logs"
        }
      }
    }

    if ![environment] {
      mutate {
        add_field => {
          "environment" => "lab"
        }
      }
    }
  }
}
output {
  if [type] == "vm_app_log" {
    if [@metadata][route_target] == "frontend" {
      elasticsearch {
        hosts => ["${VM_LOGSTASH_ES_HOST:https://elasticsearch-dung.vnpost.cloud:443}"]
        user => "${VM_LOGSTASH_ES_USER:elastic}"
        password => "${VM_LOGSTASH_ES_PASSWORD:1xNIfTEXaH0MsbQN}"
        ssl_certificate_verification => false
        index => "dung-fe-write"
      }
    }
    else if [@metadata][route_target] == "backend" {
      elasticsearch {
        hosts => ["${VM_LOGSTASH_ES_HOST:https://elasticsearch-dung.vnpost.cloud:443}"]
        user => "${VM_LOGSTASH_ES_USER:elastic}"
        password => "${VM_LOGSTASH_ES_PASSWORD:1xNIfTEXaH0MsbQN}"
        ssl_certificate_verification => false
        index => "dung-be-write"
      }
    }
    else if [@metadata][route_target] == "database" {
      elasticsearch {
        hosts => ["${VM_LOGSTASH_ES_HOST:https://elasticsearch-dung.vnpost.cloud:443}"]
        user => "${VM_LOGSTASH_ES_USER:elastic}"
        password => "${VM_LOGSTASH_ES_PASSWORD:1xNIfTEXaH0MsbQN}"
        ssl_certificate_verification => false
        index => "dung-db-write"
      }
    }
    else if [@metadata][route_target] == "webserver" {
      elasticsearch {
        hosts => ["${VM_LOGSTASH_ES_HOST:https://elasticsearch-dung.vnpost.cloud:443}"]
        user => "${VM_LOGSTASH_ES_USER:elastic}"
        password => "${VM_LOGSTASH_ES_PASSWORD:1xNIfTEXaH0MsbQN}"
        ssl_certificate_verification => false
        index => "dung-web-write"
      }
    }
    else if [@metadata][route_target] == "nestjs" {
      elasticsearch {
        hosts => ["${VM_LOGSTASH_ES_HOST:https://elasticsearch-dung.vnpost.cloud:443}"]
        user => "${VM_LOGSTASH_ES_USER:elastic}"
        password => "${VM_LOGSTASH_ES_PASSWORD:1xNIfTEXaH0MsbQN}"
        ssl_certificate_verification => false
        index => "dung-nestjs-write"
      }
    }
    else {
      elasticsearch {
        hosts => ["${VM_LOGSTASH_ES_HOST:https://elasticsearch-dung.vnpost.cloud:443}"]
        user => "${VM_LOGSTASH_ES_USER:elastic}"
        password => "${VM_LOGSTASH_ES_PASSWORD:1xNIfTEXaH0MsbQN}"
        ssl_certificate_verification => false
        index => "external-logs-write"
      }
    }
  }
}

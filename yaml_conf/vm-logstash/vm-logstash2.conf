input {
  file {
    path => "/var/log/dung-lab/*.log"
    start_position => "beginning"
    sincedb_path => "/var/lib/logstash/sincedb_dunglab"
    codec => plain
    type => "vm_app_log"
  }
}

filter {
  if [type] == "vm_app_log" {
    if [path] {
      grok {
        match => {
          "path" => "/var/log/dung-lab/%{DATA:service_name}(?:\.err)?\.log$"
        }
        tag_on_failure => ["_vm_path_parse_failure"]
      }
    }
    else if [log][file][path] {
      grok {
        match => {
          "[log][file][path]" => "/var/log/dung-lab/%{DATA:service_name}(?:\.err)?\.log$"
        }
        tag_on_failure => ["_vm_path_parse_failure"]
      }
    }

    mutate {
      remove_field => ["event"]
    }

    if [service_name] == "be" {
      grok {
        match => {
          "message" => '^\{\s*"@timestamp"\s*:\s*"%{TIMESTAMP_ISO8601:log_timestamp}"\s*,\s*"service"\s*:\s*"%{DATA:service}"\s*,\s*"level"\s*:\s*"%{WORD:level}"\s*,\s*"event"\s*:\s*"%{DATA:event}"\s*,\s*"environment"\s*:\s*"%{DATA:environment}"\s*,\s*"endpoint"\s*:\s*"%{DATA:endpoint}"\s*,\s*"request_id"\s*:\s*"%{DATA:request_id}"\s*,\s*"status_code"\s*:\s*%{INT:status_code:int}\s*,\s*"error_code"\s*:\s*"%{DATA:error_code}"\s*,\s*"message"\s*:\s*"%{DATA:message}"\s*\}$'
        }
        overwrite => ["message"]
        tag_on_failure => ["_vm_be_grok_failure"]
      }
    }
    else if [service_name] == "db" {
      grok {
        match => {
          "message" => '^\{\s*"@timestamp"\s*:\s*"%{TIMESTAMP_ISO8601:log_timestamp}"\s*,\s*"service"\s*:\s*"%{DATA:service}"\s*,\s*"level"\s*:\s*"%{WORD:level}"\s*,\s*"event"\s*:\s*"%{DATA:event}"\s*,\s*"environment"\s*:\s*"%{DATA:environment}"\s*,\s*"db_name"\s*:\s*"%{DATA:db_name}"\s*,\s*"query_type"\s*:\s*"%{DATA:query_type}"\s*,\s*"duration_ms"\s*:\s*%{INT:duration_ms:int}\s*,\s*"db_user"\s*:\s*"%{DATA:db_user}"\s*,\s*"message"\s*:\s*"%{DATA:message}"\s*\}$'
        }
        overwrite => ["message"]
        tag_on_failure => ["_vm_db_grok_failure"]
      }
    }
    else if [service_name] == "fe" {
      grok {
        match => {
          "message" => '^\{\s*"@timestamp"\s*:\s*"%{TIMESTAMP_ISO8601:log_timestamp}"\s*,\s*"service"\s*:\s*"%{DATA:service}"\s*,\s*"level"\s*:\s*"%{WORD:level}"\s*,\s*"event"\s*:\s*"%{DATA:event}"\s*,\s*"environment"\s*:\s*"%{DATA:environment}"\s*,\s*"path"\s*:\s*"%{DATA:url_path}"\s*,\s*"user_id"\s*:\s*"%{DATA:user_id}"\s*,\s*"session_id"\s*:\s*"%{DATA:session_id}"\s*,\s*"response_time_ms"\s*:\s*%{INT:response_time_ms:int}\s*,\s*"message"\s*:\s*"%{DATA:message}"\s*\}$'
        }
        overwrite => ["message"]
        tag_on_failure => ["_vm_fe_grok_failure"]
      }
    }
    else if [service_name] == "web" {
      grok {
        match => {
          "message" => '^\{\s*"@timestamp"\s*:\s*"%{TIMESTAMP_ISO8601:log_timestamp}"\s*,\s*"service"\s*:\s*"%{DATA:service}"\s*,\s*"level"\s*:\s*"%{WORD:level}"\s*,\s*"event"\s*:\s*"%{DATA:event}"\s*,\s*"environment"\s*:\s*"%{DATA:environment}"\s*,\s*"method"\s*:\s*"%{WORD:method}"\s*,\s*"path"\s*:\s*"%{DATA:url_path}"\s*,\s*"status_code"\s*:\s*%{INT:status_code:int}\s*,\s*"client_ip"\s*:\s*"%{IP:client_ip}"\s*,\s*"message"\s*:\s*"%{DATA:message}"\s*\}$'
        }
        overwrite => ["message"]
        tag_on_failure => ["_vm_web_grok_failure"]
      }
    }
    else if [service_name] == "nestjs" {
      grok {
        match => {
          "message" => [
            '^\[Nest\]\s+%{INT:process_id:int}\s+-\s+%{DATA:nest_timestamp}\s+%{LOGLEVEL:level}\s+\[%{DATA:nest_context}\]\s+%{GREEDYDATA:message}$',
            '^\[Nest\]\s+%{INT:process_id:int}\s+-\s+%{DATA:nest_timestamp}\s+%{WORD:level}\s+\[%{DATA:nest_context}\]\s+%{GREEDYDATA:message}$',
            '^%{GREEDYDATA:message}$'
          ]
        }
        overwrite => ["message"]
        tag_on_failure => ["_vm_nestjs_grok_failure"]
      }
    }

    if [service_name] in ["fe", "frontend"] {
      mutate {
        remove_field => ["service"]
        add_field => {
          "service" => "frontend"
          "[@metadata][route_target]" => "frontend"
        }
      }
    }
    else if [service_name] in ["be", "backend"] {
      mutate {
        remove_field => ["service"]
        add_field => {
          "service" => "backend"
          "[@metadata][route_target]" => "backend"
        }
      }
    }
    else if [service_name] in ["db", "database"] {
      mutate {
        remove_field => ["service"]
        add_field => {
          "service" => "database"
          "[@metadata][route_target]" => "database"
        }
      }
    }
    else if [service_name] in ["web", "webserver"] {
      mutate {
        remove_field => ["service"]
        add_field => {
          "service" => "webserver"
          "[@metadata][route_target]" => "webserver"
        }
      }
    }
    else if [service_name] == "nestjs" {
      mutate {
        remove_field => ["service"]
        add_field => {
          "service" => "nestjs"
          "[@metadata][route_target]" => "nestjs"
        }
      }
    }
    else {
      mutate {
        add_field => {
          "[@metadata][route_target]" => "wk03-logs"
        }
      }
    }

    if ![environment] {
      mutate {
        add_field => {
          "environment" => "lab"
        }
      }
    }
  }
}
output {
  if [type] == "vm_app_log" {
    if [@metadata][route_target] == "frontend" {
      elasticsearch {
        hosts => ["${VM_LOGSTASH_ES_HOST:https://elasticsearch-dung.vnpost.cloud:443}"]
        user => "${VM_LOGSTASH_ES_USER:elastic}"
        password => "${VM_LOGSTASH_ES_PASSWORD:1xNIfTEXaH0MsbQN}"
        ssl_certificate_verification => false
        index => "dung-fe-write"
      }
    }
    else if [@metadata][route_target] == "backend" {
      elasticsearch {
        hosts => ["${VM_LOGSTASH_ES_HOST:https://elasticsearch-dung.vnpost.cloud:443}"]
        user => "${VM_LOGSTASH_ES_USER:elastic}"
        password => "${VM_LOGSTASH_ES_PASSWORD:1xNIfTEXaH0MsbQN}"
        ssl_certificate_verification => false
        index => "dung-be-write"
      }
    }
    else if [@metadata][route_target] == "database" {
      elasticsearch {
        hosts => ["${VM_LOGSTASH_ES_HOST:https://elasticsearch-dung.vnpost.cloud:443}"]
        user => "${VM_LOGSTASH_ES_USER:elastic}"
        password => "${VM_LOGSTASH_ES_PASSWORD:1xNIfTEXaH0MsbQN}"
        ssl_certificate_verification => false
        index => "dung-db-write"
      }
    }
    else if [@metadata][route_target] == "webserver" {
      elasticsearch {
        hosts => ["${VM_LOGSTASH_ES_HOST:https://elasticsearch-dung.vnpost.cloud:443}"]
        user => "${VM_LOGSTASH_ES_USER:elastic}"
        password => "${VM_LOGSTASH_ES_PASSWORD:1xNIfTEXaH0MsbQN}"
        ssl_certificate_verification => false
        index => "dung-web-write"
      }
    }
    else if [@metadata][route_target] == "nestjs" {
      elasticsearch {
        hosts => ["${VM_LOGSTASH_ES_HOST:https://elasticsearch-dung.vnpost.cloud:443}"]
        user => "${VM_LOGSTASH_ES_USER:elastic}"
        password => "${VM_LOGSTASH_ES_PASSWORD:1xNIfTEXaH0MsbQN}"
        ssl_certificate_verification => false
        index => "dung-nestjs-write"
      }
    }
    else {
      elasticsearch {
        hosts => ["${VM_LOGSTASH_ES_HOST:https://elasticsearch-dung.vnpost.cloud:443}"]
        user => "${VM_LOGSTASH_ES_USER:elastic}"
        password => "${VM_LOGSTASH_ES_PASSWORD:1xNIfTEXaH0MsbQN}"
        ssl_certificate_verification => false
        index => "external-logs-write"
      }
    }
  }
}

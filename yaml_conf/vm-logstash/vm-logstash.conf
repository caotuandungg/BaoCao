input {
  file {
    path => "/var/log/dung-lab/*.log"
    start_position => "beginning"
    sincedb_path => "/var/lib/logstash/sincedb_dunglab"
    codec => plain
    type => "vm_app_log"
  }
}

filter {
  if [type] == "vm_app_log" {
    ruby {
      code => '
        source_path = event.get("path") || event.get("[log][file][path]")
        event.set("[@metadata][source_path]", source_path) if source_path
      '
    }

    grok {
      match => {
        "[@metadata][source_path]" => "/var/log/dung-lab/(?<service_name>[a-zA-Z0-9_-]+)(?:\.err)?\.log$"
      }
      tag_on_failure => ["_vm_path_parse_failure"]
    }

    if [message] =~ "^{.*}$" {
      json {
        source => "message"
        target => "app_data"
        skip_on_invalid_json => true
      }

      ruby {
        code => '
          app_data = event.get("app_data")
          if app_data.is_a?(Hash)
            app_data.each do |key, value|
              if key == "event"
                existing_event = event.get("event")
                if existing_event.is_a?(Hash)
                  event.set("event_original", existing_event["original"] || existing_event.to_s)
                  event.remove("event")
                end
                event.set("event", value)
              else
                event.set(key, value) unless event.include?(key)
              end
            end
          end
        '
      }
    }

    ruby {
      code => '
        e = event.get("event")
        if e.is_a?(Hash)
          event.set("event_original", e["original"] || e.to_s)
          event.remove("event")
        end
      '
    }

    ruby {
      code => '
        service = event.get("service_name") || event.get("service")
        target = "wk03-logs"

        case service
        when "fe", "frontend"
          event.set("service", "frontend")
          target = "frontend"
        when "be", "backend"
          event.set("service", "backend")
          target = "backend"
        when "db", "database"
          event.set("service", "database")
          target = "database"
        when "web", "webserver"
          event.set("service", "webserver")
          target = "webserver"
        when "nestjs"
          event.set("service", "nestjs")
          target = "nestjs"
        end

        event.set("[@metadata][route_target]", target)
      '
    }

    mutate {
      add_field => {
        "log_source" => "vm-dung-lab"
        "log_scope" => "external"
        "vm_name" => "simple-vm"
        "environment" => "lab"
      }
    }

    mutate {
      remove_field => ["app_data"]
    }
  }
}

output {
  if [type] == "vm_app_log" {
    if [@metadata][route_target] == "frontend" {
      elasticsearch {
        hosts => ["${VM_LOGSTASH_ES_HOST:https://elasticsearch-dung.vnpost.cloud:443}"]
        user => "${VM_LOGSTASH_ES_USER:elastic}"
        password => "${VM_LOGSTASH_ES_PASSWORD:x3RoYGlD=X9fhf6am2iG}"
        ssl_certificate_verification => false
        index => "dung-fe-write"
      }
    }
    else if [@metadata][route_target] == "backend" {
      elasticsearch {
        hosts => ["${VM_LOGSTASH_ES_HOST:https://elasticsearch-dung.vnpost.cloud:443}"]
        user => "${VM_LOGSTASH_ES_USER:elastic}"
        password => "${VM_LOGSTASH_ES_PASSWORD:x3RoYGlD=X9fhf6am2iG}"
        ssl_certificate_verification => false
        index => "dung-be-write"
      }
    }
    else if [@metadata][route_target] == "database" {
      elasticsearch {
        hosts => ["${VM_LOGSTASH_ES_HOST:https://elasticsearch-dung.vnpost.cloud:443}"]
        user => "${VM_LOGSTASH_ES_USER:elastic}"
        password => "${VM_LOGSTASH_ES_PASSWORD:x3RoYGlD=X9fhf6am2iG}"
        ssl_certificate_verification => false
        index => "dung-db-write"
      }
    }
    else if [@metadata][route_target] == "webserver" {
      elasticsearch {
        hosts => ["${VM_LOGSTASH_ES_HOST:https://elasticsearch-dung.vnpost.cloud:443}"]
        user => "${VM_LOGSTASH_ES_USER:elastic}"
        password => "${VM_LOGSTASH_ES_PASSWORD:x3RoYGlD=X9fhf6am2iG}"
        ssl_certificate_verification => false
        index => "dung-web-write"
      }
    }
    else if [@metadata][route_target] == "nestjs" {
      elasticsearch {
        hosts => ["${VM_LOGSTASH_ES_HOST:https://elasticsearch-dung.vnpost.cloud:443}"]
        user => "${VM_LOGSTASH_ES_USER:elastic}"
        password => "${VM_LOGSTASH_ES_PASSWORD:x3RoYGlD=X9fhf6am2iG}"
        ssl_certificate_verification => false
        index => "dung-nestjs-write"
      }
    }
    else {
      elasticsearch {
        hosts => ["${VM_LOGSTASH_ES_HOST:https://elasticsearch-dung.vnpost.cloud:443}"]
        user => "${VM_LOGSTASH_ES_USER:elastic}"
        password => "${VM_LOGSTASH_ES_PASSWORD:x3RoYGlD=X9fhf6am2iG}"

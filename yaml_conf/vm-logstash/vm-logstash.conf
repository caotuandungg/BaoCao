input {
  file {
    # Đọc toàn bộ các file log (.log) nằm trong thư mục dung-lab
    path => "/var/log/dung-lab/*.log"
    start_position => "beginning"
    sincedb_path => "/var/lib/logstash/sincedb_dunglab"
    codec => plain
    type => "vm_app_log"
  }
}

filter {
  if [type] == "vm_app_log" {
    # 1. Trích xuất tên service từ đường dẫn file
    # File sẽ có dạng fe.log, be.log, nestjs.err.log
    grok {
      match => {
        "path" => "/var/log/dung-lab/(?<service_name>[a-zA-Z0-9_-]+)(?:\.err)?\.log$"
      }
    }

    # 2. Xử lý chuẩn hóa tên Service và phân luồng (Routing)
    ruby {
      code => '
        service = event.get("service_name")
        target = "wk03-logs" # Luồng dự phòng (fallback)
        
        case service
        when "fe"
          event.set("service", "frontend")
          target = "frontend"
        when "be"
          event.set("service", "backend")
          target = "backend"
        when "db"
          event.set("service", "database")
          target = "database"
        when "web"
          event.set("service", "webserver")
          target = "webserver"
        when "nestjs"
          event.set("service", "nestjs")
          target = "nestjs"
        end

        event.set("[@metadata][route_target]", target)
      '
    }

    # 3. Phân tích nội dung JSON nếu app ghi log dưới dạng JSON chuẩn
    if [message] =~ "^{.*}$" {
      json {
        source => "message"
        target => "app_data"
        skip_on_invalid_json => true
      }
    }
    
    # 4. Gắn thêm các nhãn (Tag) để Kibana dễ dàng nhận diện log này tới từ VM bên ngoài
    mutate {
      add_field => {
        "log_source" => "vm-dung-lab"
        "vm_name" => "simple-vm"
        "environment" => "lab"
      }
    }
  }
}

output {
  if [type] == "vm_app_log" {
    if [@metadata][route_target] == "frontend" {
      elasticsearch {
        hosts => ["https://?????.vnpost.cloud:443"] # Thay bằng tên miền Ingress thực tế 

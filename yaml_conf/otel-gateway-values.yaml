# Cấu hình OTel Collector Gateway (Giai đoạn 1)
# File này dùng để deploy bằng Helm Chart: open-telemetry/opentelemetry-collector

mode: deployment

replicaCount: 2

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    kafka:
      protocol_version: 2.0.0
      brokers:
        - my-cluster-kafka-bootstrap.kafka-dung.svc:9092
      topics:
        - dung-logs-topic
      encoding: json
      group_id: otel-gateway-consumer-group

  processors:
    batch:
      send_batch_size: 1000
      timeout: 10s

    # Logic xử lý chính (Thay thế Logstash Filter)
    transform:
      error_mode: ignore
      log_statements:
        - context: log
          statements:
            # 1. Parse JSON cơ bản nếu body là JSON string (tương đương json { source => "log" })
            - merge_maps(cache, parse_json(body), "insert") where IsMatch(body, "^{.*}$")
            
            # 2. Loại bỏ log của chính nó (tương đương drop {})
            - drop() where IsMatch(attributes["k8s.pod.name"], "^logstash") 
            
            # 3. Xử lý log Grafana (KV parsing)
            - merge_maps(attributes, parse_kv(body, " ", "="), "upsert") where IsMatch(attributes["k8s.pod.name"], "^grafana")
            
            # 4. Chuẩn hóa tên Service và định tuyến Index (Routing)
            - set(attributes["target_index"], "wk03-logs-write")
            - set(attributes["target_index"], "dung-fe-write") where attributes["service"] == "frontend"
            - set(attributes["target_index"], "dung-be-write") where attributes["service"] == "backend"
            - set(attributes["target_index"], "dung-db-write") where attributes["service"] == "database"
            - set(attributes["target_index"], "dung-web-write") where attributes["service"] == "webserver"

    resourcedetection:
      detectors: [env, system]

  exporters:
    elasticsearch:
      endpoints: ["https://elasticsearch-master.elk-dung.svc.cluster.local:9200"]
      user: "elastic"
      password: "1xNIfTEXaH0MsbQN"
      tls:
        insecure_skip_verify: true
      # Định tuyến động dựa trên attribute target_index đã xử lý ở trên
      index: "%{attributes.target_index}"
      logs_index_common_schema: false

    # Gửi Trace về Jaeger (nếu bạn có cài Jaeger)
    otlp/jaeger:
      endpoint: "jaeger-collector.monitoring.svc:4317"
      tls:
        insecure: true

    # Thêm debug để kiểm tra log trong console của pod
    debug:
      verbosity: normal

  service:
    pipelines:
      logs:
        receivers: [kafka, otlp]
        processors: [batch, transform, resourcedetection]
        exporters: [elasticsearch, debug]
      traces:
        receivers: [otlp]
        processors: [batch, resourcedetection]
        exporters: [otlp/jaeger, debug]
      metrics:
        receivers: [otlp]
        processors: [batch, resourcedetection]
        exporters: [prometheus, debug]

# Cấu hình tài nguyên tương đương Logstash
resources:
  limits:
    cpu: 1
    memory: 2Gi
  requests:
    cpu: 200m
    memory: 512Mi

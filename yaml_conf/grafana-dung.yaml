apiVersion: v1
kind: Secret
metadata:
  name: grafana-dung-admin
  namespace: elk-dung
type: Opaque
stringData:
  admin-user: admin
  admin-password: assmin
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dung-datasources
  namespace: elk-dung
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki-Dung
        type: loki
        access: proxy
        url: http://loki-dung.elk-dung.svc.cluster.local:3100
        isDefault: true
      - name: Elasticsearch-Dung
        type: elasticsearch
        access: proxy
        url: https://elasticsearch-master.elk-dung.svc.cluster.local:9200
        basicAuth: true
        basicAuthUser: elastic
        secureJsonData:
          basicAuthPassword: 1xNIfTEXaH0MsbQN
        jsonData:
          tlsSkipVerify: true
          index: "dung-*"
          timeField: "@timestamp"
          esVersion: 8
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-dung-data
  namespace: elk-dung
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: csi-cinder-sc-delete
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-dung
  namespace: elk-dung
  labels:
    app: grafana-dung
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana-dung
  template:
    metadata:
      labels:
        app: grafana-dung
    spec:
      nodeSelector:
        kubernetes.io/hostname: wk03
      containers:
        - name: grafana
          image: grafana/grafana:11.1.4
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-dung-admin
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-dung-admin
                  key: admin-password
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 40
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-dung-data
        - name: datasources
          configMap:
            name: grafana-dung-datasources
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-dung
  namespace: elk-dung
spec:
  selector:
    app: grafana-dung
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  type: ClusterIP

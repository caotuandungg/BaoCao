replicas: 2
antiAffinity: "hard"
antiAffinityTopologyKey: "kubernetes.io/hostname"
nodeSelector:
  dung.io/logstash-node: "true"

resources:
  requests:
    cpu: "300m"
    memory: "512Mi"
  limits:
    cpu: "800m"
    memory: "1Gi"

persistence:
  enabled: true

volumeClaimTemplate:
  accessModes: ["ReadWriteOnce"]
  storageClassName: "csi-cinder-sc-delete"
  resources:
    requests:
      storage: 1Gi

logstashConfig:
  logstash.yml: |
    http.host: "0.0.0.0"
    xpack.monitoring.enabled: false
    pipeline.workers: 1

logstashPipeline:
  logstash.conf: |
    input {
      kafka {
        bootstrap_servers => "my-cluster-kafka-bootstrap.kafka-dung.svc:9092"
        topics => ["dung-logs-topic"]
        group_id => "logstash-consumer-group-2"
        auto_offset_reset => "latest"
        codec => json
      }
    }

    filter {
      if ![service] and [log] =~ "^{.*}$" {
        json {
          source => "log"
        }
      }

      if ![service] and [message] =~ "^{.*}$" {
        json {
          source => "message"
        }
      }

      if [kubernetes][pod_name] =~ /^logstash/ or [kubernetes][container_name] == "logstash" or [message] =~ /\[logstash\.outputs\.elasticsearch\]/ {
        drop {}
      }

      if [kubernetes][pod_name] =~ /^grafana/ or [kubernetes][container_name] == "grafana" {
        kv {
          source => "message"
          target => "grafana"
          field_split => " "
          value_split => "="
          trim_value => "\""
          whitespace => "lenient"
        }

        mutate {
          rename => {
            "[grafana][logger]" => "grafana_logger"
            "[grafana][t]" => "grafana_t"
            "[grafana][time]" => "grafana_time"
            "[grafana][caller]" => "grafana_caller"
            "[grafana][userId]" => "grafana_user_id"
            "[grafana][orgId]" => "grafana_org_id"
            "[grafana][orgID]" => "grafana_org_id_alt"
            "[grafana][uname]" => "grafana_uname"
            "[grafana][level]" => "grafana_level"
            "[grafana][msg]" => "grafana_msg"
            "[grafana][error]" => "grafana_error"
            "[grafana][version]" => "grafana_version"
            "[grafana][method]" => "grafana_method"
            "[grafana][path]" => "grafana_path"
            "[grafana][status]" => "grafana_status"
            "[grafana][time_ms]" => "grafana_time_ms"
            "[grafana][duration]" => "grafana_duration"
            "[grafana][query]" => "grafana_query"
            "[grafana][queryType]" => "grafana_query_type"
            "[grafana][endpoint]" => "grafana_endpoint"
            "[grafana][pluginId]" => "grafana_plugin_id"
            "[grafana][dsName]" => "grafana_datasource_name"
            "[grafana][dsUID]" => "grafana_datasource_uid"
            "[grafana][statusCode]" => "grafana_status_code"
            "[grafana][lokiHost]" => "grafana_loki_host"
            "[grafana][lokiPath]" => "grafana_loki_path"
            "[grafana][start]" => "grafana_start"
            "[grafana][end]" => "grafana_end"
            "[grafana][step]" => "grafana_step"
            "[grafana][direction]" => "grafana_direction"
            "[grafana][maxLines]" => "grafana_max_lines"
            "[grafana][supportingQueryType]" => "grafana_supporting_query_type"
            "[grafana][fromAlert]" => "grafana_from_alert"
            "[grafana][contentLength]" => "grafana_content_length"
            "[grafana][contentEncoding]" => "grafana_content_encoding"
            "[grafana][stage]" => "grafana_stage"
            "[grafana][framesLength]" => "grafana_frames_length"
            "[grafana][pluginVersion]" => "grafana_plugin_version"
            "[grafana][status_source]" => "grafana_status_source"
            "[grafana][statusSource]" => "grafana_status_source"
            "[grafana][namespace]" => "grafana_namespace"
            "[grafana][group]" => "grafana_group"
            "[grafana][resource]" => "grafana_resource"
            "[grafana][size]" => "grafana_size"
            "[grafana][reason]" => "grafana_reason"
            "[grafana][elapsed]" => "grafana_elapsed"
            "[grafana][listRV]" => "grafana_list_rv"
            "[grafana][key]" => "grafana_key"
            "[grafana][expiration]" => "grafana_expiration"
            "[grafana][sourceVersionAPI]" => "grafana_source_version_api"
            "[grafana][targetVersionAPI]" => "grafana_target_version_api"
            "[grafana][erroredConversionFunc]" => "grafana_errored_conversion_func"
            "[grafana][dashboardUID]" => "grafana_dashboard_uid"
            "[grafana][errorType]" => "grafana_error_type"
            "[grafana][panelsLost]" => "grafana_panels_lost"
            "[grafana][queriesLost]" => "grafana_queries_lost"
            "[grafana][annotationsLost]" => "grafana_annotations_lost"
            "[grafana][linksLost]" => "grafana_links_lost"
            "[grafana][variablesLost]" => "grafana_variables_lost"
            "[grafana][count]" => "grafana_count"
            "[grafana][itemsProcessed]" => "grafana_items_processed"
            "[grafana][UID]" => "grafana_uid"
            "[grafana][deletionTimestamp]" => "grafana_deletion_timestamp"
            "[grafana][resourceVersion]" => "grafana_resource_version"
            "[grafana][referer]" => "grafana_referer"
            "[grafana][handler]" => "grafana_handler"
            "[grafana][remote_addr]" => "grafana_remote_addr"
          }
          convert => {
            "grafana_user_id" => "integer"
            "grafana_org_id" => "integer"
            "grafana_org_id_alt" => "integer"
            "grafana_status" => "integer"
            "grafana_time_ms" => "integer"
            "grafana_status_code" => "integer"
            "grafana_size" => "integer"
            "grafana_content_length" => "integer"
            "grafana_max_lines" => "integer"
            "grafana_frames_length" => "integer"
            "grafana_count" => "integer"
            "grafana_items_processed" => "integer"
            "grafana_panels_lost" => "integer"
            "grafana_queries_lost" => "integer"
            "grafana_annotations_lost" => "integer"
            "grafana_links_lost" => "integer"
            "grafana_variables_lost" => "integer"
            "grafana_from_alert" => "boolean"
          }
          # Keep flattened fields for easier query in Kibana.
          remove_field => ["grafana"]
        }
      }

      if [kubernetes][pod_name] =~ /^loki-gateway/ and [kubernetes][container_name] == "nginx" {
        dissect {
          mapping => {
            "message" => '%{loki_gateway_remote_addr} - %{loki_gateway_remote_user} [%{loki_gateway_time}]  %{loki_gateway_status} "%{loki_gateway_method} %{loki_gateway_request} HTTP/%{loki_gateway_http_version}" %{loki_gateway_bytes} "%{loki_gateway_referrer}" "%{loki_gateway_user_agent}" "%{loki_gateway_forwarded_for}"'
          }
          tag_on_failure => ["_loki_gateway_dissect_failure"]
        }

        if "_loki_gateway_dissect_failure" in [tags] {
          dissect {
            mapping => {
              "message" => '%{loki_gateway_remote_addr} - %{loki_gateway_remote_user} [%{loki_gateway_time}]  %{loki_gateway_status} "%{loki_gateway_method} %{loki_gateway_request} HTTP/%{loki_gateway_http_version}" %{loki_gateway_bytes} "%{loki_gateway_referrer}" "%{loki_gateway_user_agent}" -'
            }
            tag_on_failure => ["_loki_gateway_parse_failure"]
          }
        }

        if !("_loki_gateway_dissect_failure" in [tags]) or !("_loki_gateway_parse_failure" in [tags]) {
          mutate {
            convert => {
              "loki_gateway_status" => "integer"
              "loki_gateway_bytes" => "integer"
            }
            remove_tag => ["_loki_gateway_dissect_failure", "_loki_gateway_parse_failure", "_loki_gateway_grok_failure"]
          }

          ruby {
            code => '
              req = event.get("loki_gateway_request")
              if req.is_a?(String)
                parts = req.split("?", 2)
                event.set("loki_gateway_path", parts[0])
                event.set("loki_gateway_query", parts[1]) if parts.length > 1
              end

              xff = event.get("loki_gateway_forwarded_for")
              event.remove("loki_gateway_forwarded_for") if xff == "-"
            '
          }
        }
      }

      if [kubernetes][pod_name] =~ /^prometheus/ or [kubernetes][container_name] == "prometheus" {
        kv {
          source => "message"
          target => "prometheus"
          field_split => " "
          value_split => "="
          trim_value => "\""
          whitespace => "lenient"
        }

        mutate {
          rename => {
            "[prometheus][ts]" => "prometheus_ts"
            "[prometheus][caller]" => "prometheus_caller"
            "[prometheus][level]" => "prometheus_level"
            "[prometheus][component]" => "prometheus_component"
            "[prometheus][msg]" => "prometheus_msg"
            "[prometheus][err]" => "prometheus_err"
            "[prometheus][duration]" => "prometheus_duration"
          }
          # Keep only the normalized top-level fields above.
          remove_field => ["prometheus"]
        }
      }

      ruby {
        code => '
          e = event.get("event")
          if e.is_a?(Hash)
            event.set("event_original", e["original"] || e.to_s)
            event.remove("event")
          end
        '
      }

      ruby {
        code => '
          s = event.get("service")
          if s.is_a?(Hash)
            name = s["name"] || s["id"] || s.to_s
            event.set("service", name)
            event.set("service_name", name)
          elsif s.nil?
            sn = event.get("service.name")
            if sn
              event.set("service", sn)
              event.set("service_name", sn)
            end
          end

          sdot = event.get("service.name")
          if sdot
            event.set("service", sdot) if event.get("service").nil?
            event.set("service_name", sdot)
            event.remove("service.name")
          end

          edot = event.get("event.dataset")
          if edot
            event.set("event_dataset", edot)
            event.remove("event.dataset")
          end
        '
      }

      ruby {
        code => '
          service = event.get("service")

          route = nil

          if ["frontend", "backend", "database", "webserver"].include?(service)
            route = service
          else
            route = "wk03-logs"
          end

          event.set("[@metadata][route_target]", route) if route
        '
      }

      mutate {
        remove_field => [
          "[kubernetes][labels]",
          "[process_exec][parent][pod][pod_labels]",
          "[process_exec][process][pod][pod_labels]",
          "[process_exit][process][pod][pod_labels]",
          "[process_exit][parent][pod][pod_labels]"
        ]
      }
    }

    output {
      if [@metadata][route_target] == "frontend" {
        elasticsearch {
          hosts => ["https://elasticsearch-master.elk-dung.svc.cluster.local:9200"]
          user => "elastic"
          password => "1xNIfTEXaH0MsbQN"
          ssl_certificate_verification => false
          index => "dung-fe-write"
        }
      }
      else if [@metadata][route_target] == "backend" {
        elasticsearch {
          hosts => ["https://elasticsearch-master.elk-dung.svc.cluster.local:9200"]
          user => "elastic"
          password => "1xNIfTEXaH0MsbQN"
          ssl_certificate_verification => false
          index => "dung-be-write"
        }
      }
      else if [@metadata][route_target] == "database" {
        elasticsearch {
          hosts => ["https://elasticsearch-master.elk-dung.svc.cluster.local:9200"]
          user => "elastic"
          password => "1xNIfTEXaH0MsbQN"
          ssl_certificate_verification => false
          index => "dung-db-write"
        }
      }
      else if [@metadata][route_target] == "webserver" {
        elasticsearch {
          hosts => ["https://elasticsearch-master.elk-dung.svc.cluster.local:9200"]
          user => "elastic"
          password => "1xNIfTEXaH0MsbQN"
          ssl_certificate_verification => false
          index => "dung-web-write"
        }
      }
      else if [@metadata][route_target] == "wk03-logs" {
        elasticsearch {
          hosts => ["https://elasticsearch-master.elk-dung.svc.cluster.local:9200"]
          user => "elastic"
          password => "1xNIfTEXaH0MsbQN"
          ssl_certificate_verification => false
          index => "wk03-logs-write"
        }
      }
    }

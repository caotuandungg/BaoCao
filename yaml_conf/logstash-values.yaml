replicas: 3
antiAffinity: "hard"
antiAffinityTopologyKey: "kubernetes.io/hostname"

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "1000m"
    memory: "2Gi"


# logstash-values.yaml
# Helm chart: elastic/logstash (Dành cho ELK Stack)

persistence:
  enabled: true

volumeClaimTemplate:
  accessModes: ["ReadWriteOnce"]
  storageClassName: "csi-cinder-sc-delete"
  resources:
    requests:
      storage: 2Gi

logstashConfig:
  logstash.yml: |
    http.host: "0.0.0.0"
    xpack.monitoring.enabled: false

logstashPipeline:
  logstash.conf: |
    input {
      kafka {
        bootstrap_servers => "my-cluster-kafka-bootstrap.kafka-dung.svc:9092"
        topics => ["dung-logs-topic"]
        group_id => "logstash-consumer-group-2"
        auto_offset_reset => "latest"
        codec => json
      }
    }

    filter {
      # Tự động giải mã JSON từ trường 'log' nếu dữ liệu gốc bị bọc trong chuỗi văn bản
      # Giúp Logstash tự động nhận diện và "mở hộp" các bản tin log bị đóng gói sai cách, đảm bảo bạn luôn có đầy đủ các trường dữ liệu (service, level, msg) để tìm kiếm trên giao diện web
      if ![service] and [log] =~ "^{.*}$" {
        json {
          source => "log"
        }
      }

      if ![service] and [message] =~ "^{.*}$" {
        json {
          source => "message"
        }
      }

      # Ngăn chặn vòng lặp tự hấp thụ log (self-ingest loop) của Logstash.
      if [kubernetes][pod_name] =~ /^logstash/ or [kubernetes][container_name] == "logstash" or [message] =~ /\[logstash\.outputs\.elasticsearch\]/ {
        drop {}
      }

      # Chuẩn hóa trường 'event' kiểu Object để tránh xung đột kiểu dữ liệu (Mapping Conflict) trong Elasticsearch
      ruby {
        code => '
          e = event.get("event")
          if e.is_a?(Hash)
            event.set("event_original", e["original"] || e.to_s)
            event.remove("event")
          end
        '
      }

      # Chuẩn hóa trường 'service' sang kiểu String để tránh xung đột khi log dùng ECS object service.name.
      ruby {
        code => '
          s = event.get("service")
          if s.is_a?(Hash)
            name = s["name"] || s["id"] || s.to_s
            event.set("service", name)
            event.set("service_name", name)
          elsif s.nil?
            sn = event.get("service.name")
            if sn
              event.set("service", sn)
              event.set("service_name", sn)
            end
          end

          # Chuẩn hóa trường 'service.name' có dấu chấm nếu tồn tại dưới dạng key văn bản.
          sdot = event.get("service.name")
          if sdot
            event.set("service", sdot) if event.get("service").nil?
            event.set("service_name", sdot)
            event.remove("service.name")
          end

          # Chuẩn hóa trường 'event.dataset' có dấu chấm để tránh xung đột với trường 'event' của ứng dụng (kiểu string).
          edot = event.get("event.dataset")
          if edot
            event.set("event_dataset", edot)
            event.remove("event.dataset")
          end
        '
      }

      mutate {
        remove_field => ["[kubernetes][labels]"]
      }
    }

    output {
      # Log ứng dụng: Điều hướng theo 'service' trước (không phụ thuộc vào namespace).
      if [service] == "frontend" {
        elasticsearch {
          hosts => ["https://elasticsearch-master.elk.svc.cluster.local:9200"]
          user => "elastic"
          password => "1qK@B5mQ"
          ssl_certificate_verification => false
          index => "dung-fe-write"
        }
      }
      else if [service] == "backend" {
        elasticsearch {
          hosts => ["https://elasticsearch-master.elk.svc.cluster.local:9200"]
          user => "elastic"
          password => "1qK@B5mQ"
          ssl_certificate_verification => false
          index => "dung-be-write"
        }
      }
      else if [service] == "database" {
        elasticsearch {
          hosts => ["https://elasticsearch-master.elk.svc.cluster.local:9200"]
          user => "elastic"
          password => "1qK@B5mQ"
          ssl_certificate_verification => false
          index => "dung-db-write"
        }
      }
      else if [service] == "webserver" {
        elasticsearch {
          hosts => ["https://elasticsearch-master.elk.svc.cluster.local:9200"]
          user => "elastic"
          password => "1qK@B5mQ"
          ssl_certificate_verification => false
          index => "dung-web-write"
        }
      }
      # Các bản ghi từ namespace 'dung-lab' mà không xác định được service cụ thể.
      else if [kubernetes][namespace_name] == "dung-lab" {
        elasticsearch {
          hosts => ["https://elasticsearch-master.elk.svc.cluster.local:9200"]
          user => "elastic"
          password => "1qK@B5mQ"
          ssl_certificate_verification => false
          index => "dung-lab-khac-%{+YYYY.MM.dd}"
        }
      }
      # Các Namespace của hệ thống hoặc nền tảng (Platform/System).
      else if [kubernetes][namespace_name] =~ /^(kube-system|monitoring|ingress-nginx)$/ {
        elasticsearch {
          hosts => ["https://elasticsearch-master.elk.svc.cluster.local:9200"]
          user => "elastic"
          password => "1qK@B5mQ"
          ssl_certificate_verification => false
          index => "platform-k8s-%{+YYYY.MM.dd}"
        }
      }
      # Các Namespace còn lại trong cụm (Cluster).
      else {
        elasticsearch {
          hosts => ["https://elasticsearch-master.elk.svc.cluster.local:9200"]
          user => "elastic"
          password => "1qK@B5mQ"
          ssl_certificate_verification => false
          index => "cluster-khac-%{+YYYY.MM.dd}"
        }
      }
    }

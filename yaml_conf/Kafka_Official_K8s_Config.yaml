# Nguồn tài liệu chính thức cho KRaft + Node Pools: https://strimzi.io/docs/operators/latest/overview.html#architecture-kraft-str
# Lưu ý: Ở Strimzi 0.46+, KafkaNodePool là một loại tài nguyên (Kind) tách biệt.

apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: my-cluster
  annotations:
    # Kích hoạt tính năng Node Pools cho cụm này
    strimzi.io/node-pools: "enabled"
spec:
  kafka:
    version: 4.1.0
    listeners:
      - name: plain # luồng nội không mã hoá
        port: 9092
        type: internal
        tls: false
      - name: tls # luồng nội bộ có mã hoá
        port: 9093
        type: internal
        tls: true
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      # Thêm cấu hình tự dọn dẹp ổ cứng
      log.retention.bytes: 5368709120  # Giới hạn 5GB mỗi broker
      log.retention.check.interval.ms: 300000 # 5 phút kiểm tra xóa 1 lần

  entityOperator:

    topicOperator:
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
    userOperator:
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"


---
# Khai báo Node Pool riêng biệt để thay thế cho Zookeeper (Chế độ KRaft)
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: combined
  labels:
    # Liên kết Node Pool này với cụm Kafka "my-cluster" ở trên
    strimzi.io/cluster: my-cluster
spec:
  replicas: 3
  roles:
    - controller
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 20Gi
        class: csi-cinder-sc-delete
        deleteClaim: false
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"




# Github config file:  https://github.com/jertel/elastalert2/blob/master/examples/rules/example_frequency.yaml
# Rule Type Doc:     https://elastalert2.readthedocs.io/en/latest/ruletypes.html#frequency
apiVersion: v1
kind: ConfigMap
metadata:
  name: elastalert-rules
  namespace: elk
data:
  backend-error-alert.yaml: |
    name: "Backend Error Count Alert"
    type: frequency
    index: dung-be-*
    num_events: 10
    timeframe:
      minutes: 5
    filter:
      - term:
          level: "ERROR"
    alert:
      - debug
    alert_text: |
      Backend service has generated more than 10 ERROR logs in the last 5 minutes.
      Number of errors: {0}
    alert_text_args:
      - num_matches

  nginx-5xx-alert.yaml: |
    name: "Nginx 5xx Error Alert"
    type: frequency
    index: dung-web-*
    num_events: 20
    timeframe:
      minutes: 5
    filter:
      - range:
          status_code:
            gte: 500
    alert:
      - debug
    alert_text: |
      Webserver has returned more than 20 responses with status >= 500 in the last 5 minutes.
      Number of 5xx errors: {0}
    alert_text_args:
      - num_matches

  db-auth-failed-alert.yaml: |
    name: "Database Auth Failed Alert"
    type: frequency
    index: dung-db-*
    num_events: 5
    timeframe:
      minutes: 10
    filter:
      - term:
          event: "auth_failed"
    alert:
      - debug
    alert_text: |
      Database has logged more than 5 authentication failures in the last 10 minutes.
      Number of failures: {0}
    alert_text_args:
      - num_matches

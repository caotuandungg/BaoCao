apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-config
  namespace: elk
data:
  logstash.conf: |
    input {
      # Lắng nghe giao thức Syslog (Cổng chuẩn 514)
      syslog {
        port => 5140
        type => syslog
      }
    }

    filter {
      if [type] == "syslog" {
        # Bạn có thể thêm các xử lý Grok ở đây nếu cần phân tích sâu hơn
      }
    }

    output {
      # Đẩy log về Elasticsearch nội bộ
      elasticsearch {
        hosts => ["https://elasticsearch-master:9200"]
        user => "elastic"
        password => "1qK@B5mQ"
        ssl => true
        ssl_certificate_verification => false
        index => "syslog-network-%{+YYYY.MM.dd}"
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash-aggregator
  namespace: elk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logstash
  template:
    metadata:
      labels:
        app: logstash
    spec:
      containers:
      - name: logstash
        image: docker.elastic.co/logstash/logstash:8.12.0
        ports:
        - containerPort: 5140
          protocol: UDP
        volumeMounts:
        - name: config
          mountPath: /usr/share/logstash/pipeline/
      volumes:
      - name: config
        configMap:
          name: logstash-config
---
apiVersion: v1
kind: Service
metadata:
  name: logstash-syslog-external
  namespace: elk
spec:
  type: NodePort
  selector:
    app: logstash
  ports:
  - name: syslog-udp
    protocol: UDP
    port: 514
    targetPort: 5140
    # Cổng mà bạn sẽ cấu hình trên Switch/Router để trỏ log về
    nodePort: 30514
